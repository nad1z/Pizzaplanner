<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Pizza slice: tip at (16,30), outer corners at (3,6) and (29,6) -->
  <!-- Circle center at tip (16,30), radius ≈27.3 → outer arc bows upward -->

  <!-- Cheese body -->
  <path d="M16 30 L3 6 A27.3 27.3 0 0 1 29 6 Z" fill="#f5d060"/>

  <!-- Crust band: outer arc minus inner arc -->
  <path d="M3 6 A27.3 27.3 0 0 1 29 6 L27.6 8.6 A24.3 24.3 0 0 0 4.4 8.6 Z" fill="#c8884e"/>

  <!-- Pepperoni -->
  <circle cx="13" cy="17" r="2.5" fill="#c0522a"/>
  <circle cx="20" cy="15" r="2.5" fill="#c0522a"/>
  <circle cx="16" cy="23" r="2"   fill="#c0522a"/>
</svg>
